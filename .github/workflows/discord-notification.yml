name: 🔔 Notification Discord

on:
  workflow_run:
    workflows: ['Generate Image and Deploy'] # ← nom exact du workflow ci-dessus
    types:
      - completed

jobs:
  notify-discord:
    name: Envoi notification Discord
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Récupérer le message du commit
        id: commit
        run: |
          {
            echo 'message<<EOF'
            git log -1 --pretty=%B
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      # ✅ Télécharge l'artefact du workflow_run parent
      - name: Download de l'artefact image-generee
        uses: actions/download-artifact@v4
        with:
          name: image-generee
          path: ./artifacts/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # ✅ Extrait dynamiquement le nom du fichier
      - name: Extraire le nom du fichier image
        id: image
        run: |
          IMAGE_NAME=$(ls ./artifacts/ | head -n 1)
          echo "Image trouvée : $IMAGE_NAME"
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      # ✅ Construit l'URL GitHub Pages
      - name: Construire l'URL de l'image
        id: url
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          IMAGE_NAME="${{ steps.image.outputs.name }}"
          IMAGE_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/${IMAGE_NAME}"
          echo "URL : $IMAGE_URL"
          echo "image_url=$IMAGE_URL" >> $GITHUB_OUTPUT

      # ✅ Envoie la notification Discord avec embed
      - name: Envoyer la notification Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          COMMIT_MSG=$(echo "${{ steps.commit.outputs.message }}" | head -n 1)
          IMAGE_URL="${{ steps.url.outputs.image_url }}"

          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚀 Nouveau déploiement\",
                \"color\": 5814783,
                \"fields\": [
                  {
                    \"name\": \"📝 Message du commit\",
                    \"value\": \"${COMMIT_MSG}\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"📷 Image générée\",
                    \"value\": \"[Voir l'image](${IMAGE_URL})\",
                    \"inline\": false
                  }
                ],
                \"image\": {
                  \"url\": \"${IMAGE_URL}\"
                },
                \"footer\": {
                  \"text\": \"GitHub Actions • ${{ github.repository }}\"
                }
              }]
            }"

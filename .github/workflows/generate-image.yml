name: Generate Image and Deploy

on:
  push:
    branches:
      - main

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get last commit message
        id: commit
        run: |
          {
            echo 'message<<EOF'
            git log -1 --pretty=%B
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create images folder
        run: mkdir -p images

      - name: Call DynaPictures API
        env:
          COMMIT_MESSAGE: ${{ steps.commit.outputs.message }}
        run: |
          PAYLOAD=$(jq -n --arg text "$COMMIT_MESSAGE" '{input: {text: $text}}')
          RESPONSE=$(curl -fsS -X POST "https://api.dynapictures.com/designs/8707667c79" \
          -H "Authorization: Bearer ${{ secrets.DYNAPICTURES_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD")
          echo "$RESPONSE" > response.json

      - name: Debug API response
        run: cat response.json

      - name: Extract image URL
        id: extract
        run: |
          IMAGE_URL=$(jq -er '.output.image_url // .output.imageUrl // .image_url // .imageUrl' response.json)
          if [ -z "$IMAGE_URL" ] || [ "$IMAGE_URL" = "null" ]; then
            echo "DynaPictures API did not return an image URL"
            cat response.json
            exit 1
          fi
          echo "image_url=$IMAGE_URL" >> $GITHUB_OUTPUT
      - name: Download generated image
        run: |
          curl -fsS -o images/generated_image.png "${{ steps.extract.outputs.image_url }}"
      - name: Generate index.html
        run: |
          echo "<html><body><h1>Generated Image</h1><img src='generated_image.png' alt='Generated Image'></body></html>" > images/index.html
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./images
          keep_files: true

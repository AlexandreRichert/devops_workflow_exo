name: Comment On Commit With Generated Image

on:
  workflow_run:
    workflows: ['Generate Image and Deploy']
    types:
      - completed

permissions:
  contents: write

jobs:
  comment-on-commit:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Get commit message
        id: commit
        run: |
          {
            echo 'message<<EOF'
            git log -1 --pretty=%B
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Download generated image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-generee
          path: ./artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Get generated image filename
        id: image
        run: |
          IMAGE_FILE=$(ls ./artifacts | head -n 1)
          if [ -z "$IMAGE_FILE" ]; then
            echo "No file found in ./artifacts"
            exit 1
          fi
          echo "image_file=$IMAGE_FILE" >> "$GITHUB_OUTPUT"

      - name: Build image URL
        id: image_url
        run: |
          IMAGE_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/images/${{ steps.image.outputs.image_file }}"
          echo "image_url=$IMAGE_URL" >> "$GITHUB_OUTPUT"

      - name: Add comment on commit
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commitSha = "${{ github.event.workflow_run.head_sha }}";
            const commitMessage = `${{ steps.commit.outputs.message }}`;
            const imageUrl = "${{ steps.image_url.outputs.image_url }}";

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: commitSha,
              body: [
                "### Image generee automatiquement",
                "",
                `**Message du commit :** ${commitMessage}`,
                "",
                `![Image generee](${imageUrl})`,
                "",
                "_Commentaire ajoute automatiquement par GitHub Actions._"
              ].join("\n")
            });
